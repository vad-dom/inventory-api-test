services:
  mysql:
    image: mysql:8.4
    container_name: inventory_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: inventory_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app-init:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inventory_app_init
    command: init.sh
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    restart: no

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inventory_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      app-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    container_name: inventory_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: inventory-swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /app/openapi.yaml
    volumes:
      - ./src/docs/openapi.yaml:/app/openapi.yaml:ro
    depends_on:
      - nginx

volumes:
  mysql_data: