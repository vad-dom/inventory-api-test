openapi: 3.0.3

info:
  title: Inventory API
  version: 1.0.0
  description: |
    REST API для складского учета.

    Все запросы должны содержать заголовок `X-Api-Key`.
    Все ответы API возвращаются в едином JSON-формате.

servers:
  - url: http://localhost:8080/api/v1
    description: Docker Compose
  - url: http://127.0.0.1:8000/api/v1
    description: Laravel development server

security:
  - ApiKeyAuth: []

tags:
  - name: Products
    description: Управление товарами
  - name: Warehouses
    description: Управление складами
  - name: Stock operations
    description: Приход, списание и перемещение товара
  - name: Stock balances
    description: Просмотр складских остатков
  - name: Stock movements
    description: История складских операций
  - name: Statistics
    description: Статистика по остаткам

paths:
  /products:
    post:
      tags: [Products]
      summary: Создать товар
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
            example:
              sku: CPU-001
              name: Intel Core i5
              description: Desktop processor
              is_active: true
      responses:
        '201':
          description: Товар создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              example:
                success: true
                data:
                  id: 1
                  sku: CPU-001
                  name: Intel Core i5
                  description: Desktop processor
                  is_active: true
                  created_at: '2026-07-19T12:00:00.000000Z'
                  updated_at: '2026-07-19T12:00:00.000000Z'
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [Products]
      summary: Получить список товаров
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          description: Поиск по SKU, названию и описанию
          schema:
            type: string
        - name: is_active
          in: query
          description: Фильтр по активности
          schema:
            type: boolean
        - name: sort
          in: query
          description: Поле сортировки
          schema:
            type: string
            enum: [id, sku, name, created_at, updated_at]
            default: created_at
        - $ref: '#/components/parameters/Direction'
      responses:
        '200':
          description: Список товаров
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'
              example:
                success: true
                data:
                  - id: 1
                    sku: CPU-001
                    name: Intel Core i5
                    description: Desktop processor
                    is_active: true
                    created_at: '2026-07-19T12:00:00.000000Z'
                    updated_at: '2026-07-19T12:00:00.000000Z'
                meta:
                  page: 1
                  per_page: 15
                  total: 1
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    get:
      tags: [Products]
      summary: Получить товар
      operationId: getProduct
      responses:
        '200':
          description: Данные товара, суммарный остаток и остатки по складам
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductDetails'
              example:
                success: true
                data:
                  id: 1
                  sku: CPU-001
                  name: Intel Core i5
                  description: Desktop processor
                  is_active: true
                  created_at: '2026-07-19T12:00:00.000000Z'
                  updated_at: '2026-07-19T12:00:00.000000Z'
                  total_quantity: 10
                  stock_balances:
                    - warehouse:
                        id: 1
                        code: MAIN
                        name: Main warehouse
                      quantity: 10
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Products]
      summary: Обновить товар
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWriteRequest'
            example:
              sku: CPU-001
              name: Intel Core i5-12400
              description: Desktop processor
              is_active: true
      responses:
        '200':
          description: Товар обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Products]
      summary: Удалить товар
      description: |
        Удаление запрещено при наличии положительных остатков или истории складских операций.
      operationId: deleteProduct
      responses:
        '200':
          description: Товар удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
              example:
                success: true
                data: null
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Товар имеет остаток или историю операций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                hasStock:
                  value:
                    success: false
                    error:
                      code: PRODUCT_CANNOT_BE_DELETED
                      message: Product has stock and cannot be deleted.
                    meta:
                      request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
                hasMovements:
                  value:
                    success: false
                    error:
                      code: PRODUCT_CANNOT_BE_DELETED
                      message: Product has movements and cannot be deleted.
                    meta:
                      request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '500':
          $ref: '#/components/responses/InternalError'

  /products/{id}/deactivate:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    patch:
      tags: [Products]
      summary: Деактивировать товар
      description: Товар нельзя деактивировать, если по нему есть положительный остаток.
      operationId: deactivateProduct
      responses:
        '200':
          description: Товар деактивирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: По товару есть положительный остаток
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: PRODUCT_HAS_STOCK
                  message: Product has stock and cannot be deactivated.
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '500':
          $ref: '#/components/responses/InternalError'

  /warehouses:
    post:
      tags: [Warehouses]
      summary: Создать склад
      operationId: createWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseWriteRequest'
            example:
              name: Main warehouse
              code: MAIN
              is_active: true
      responses:
        '201':
          description: Склад создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [Warehouses]
      summary: Получить список складов
      operationId: listWarehouses
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          description: Поиск по названию и коду склада
          schema:
            type: string
        - name: is_active
          in: query
          description: Фильтр по активности
          schema:
            type: boolean
      responses:
        '200':
          description: Список складов
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Warehouse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /warehouses/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceId'

    get:
      tags: [Warehouses]
      summary: Получить склад
      operationId: getWarehouse
      responses:
        '200':
          description: Данные склада и агрегированная информация об остатках
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WarehouseDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Warehouses]
      summary: Обновить склад
      operationId: updateWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseWriteRequest'
            example:
              name: Main warehouse updated
              code: MAIN
              is_active: true
      responses:
        '200':
          description: Склад обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Warehouses]
      summary: Удалить склад
      description: |
        Удаление запрещено при наличии положительных остатков или истории складских операций.
      operationId: deleteWarehouse
      responses:
        '200':
          description: Склад удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Склад имеет остаток или историю операций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                hasStock:
                  value:
                    success: false
                    error:
                      code: WAREHOUSE_CANNOT_BE_DELETED
                      message: Warehouse has stock and cannot be deleted.
                    meta:
                      request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
                hasMovements:
                  value:
                    success: false
                    error:
                      code: WAREHOUSE_CANNOT_BE_DELETED
                      message: Warehouse has movements and cannot be deleted.
                    meta:
                      request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '500':
          $ref: '#/components/responses/InternalError'

  /warehouses/{id}/deactivate:
    parameters:
      - $ref: '#/components/parameters/ResourceId'
    patch:
      tags: [Warehouses]
      summary: Деактивировать склад
      description: Склад нельзя деактивировать, если на нем есть положительный остаток.
      operationId: deactivateWarehouse
      responses:
        '200':
          description: Склад деактивирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: На складе есть положительный остаток
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: WAREHOUSE_HAS_STOCK
                  message: Warehouse has stock and cannot be deactivated.
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/income:
    post:
      tags: [Stock operations]
      summary: Выполнить приход товара
      description: |
        Операция разрешена только для активного товара и активного склада.
        Увеличивает остаток и создает движение типа `income`.
      operationId: createStockIncome
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomeRequest'
            example:
              product_id: 1
              warehouse_id: 1
              quantity: 10
              comment: Initial stock
      responses:
        '201':
          description: Приход выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/InactiveResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/write-off:
    post:
      tags: [Stock operations]
      summary: Выполнить списание товара
      description: |
        Операция разрешена только для активного товара и активного склада.
        Уменьшает остаток и создает движение типа `write_off`.
      operationId: createStockWriteOff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteOffRequest'
            example:
              product_id: 1
              warehouse_id: 1
              quantity: 3
              comment: Damaged items
      responses:
        '201':
          description: Списание выполнено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/InactiveResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InsufficientStock'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/transfer:
    post:
      tags: [Stock operations]
      summary: Переместить товар между складами
      description: |
        Операция разрешена только для активного товара и активных складов.
        Исходный и целевой склады должны отличаться.
      operationId: createStockTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            example:
              product_id: 1
              source_warehouse_id: 1
              target_warehouse_id: 2
              quantity: 5
              comment: Transfer to secondary warehouse
      responses:
        '201':
          description: Перемещение выполнено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/InactiveResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InsufficientStock'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/balances:
    get:
      tags: [Stock balances]
      summary: Получить список остатков
      operationId: listStockBalances
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: product_id
          in: query
          description: Фильтр по товару
          schema:
            type: integer
            minimum: 1
        - name: warehouse_id
          in: query
          description: Фильтр по складу
          schema:
            type: integer
            minimum: 1
        - name: only_positive
          in: query
          description: Показывать только остатки больше нуля
          schema:
            type: boolean
        - name: sort
          in: query
          description: Поле сортировки
          schema:
            type: string
            enum: [quantity, created_at, updated_at]
        - $ref: '#/components/parameters/DirectionOptional'
      responses:
        '200':
          description: Список остатков с товаром и складом
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/StockBalance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/balances/{product}/{warehouse}:
    parameters:
      - name: product
        in: path
        required: true
        description: ID товара
        schema:
          type: integer
          minimum: 1
      - name: warehouse
        in: path
        required: true
        description: ID склада
        schema:
          type: integer
          minimum: 1
    get:
      tags: [Stock balances]
      summary: Получить остаток товара на складе
      description: Если запись остатка отсутствует, возвращается количество `0`.
      operationId: getStockBalance
      responses:
        '200':
          description: Остаток товара на складе
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StockBalance'
              example:
                success: true
                data:
                  product:
                    id: 1
                    sku: CPU-001
                    name: Intel Core i5
                  warehouse:
                    id: 1
                    code: MAIN
                    name: Main warehouse
                  quantity: 10
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/movements:
    get:
      tags: [Stock movements]
      summary: Получить историю складских операций
      operationId: listStockMovements
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: product_id
          in: query
          description: Фильтр по товару
          schema:
            type: integer
            minimum: 1
        - name: warehouse_id
          in: query
          description: Поиск по складу-источнику или складу-получателю
          schema:
            type: integer
            minimum: 1
        - name: type
          in: query
          description: Тип операции
          schema:
            type: string
            enum: [income, write_off, transfer]
        - name: created_from
          in: query
          description: Начало периода
          schema:
            type: string
            format: date
        - name: created_to
          in: query
          description: Конец периода
          schema:
            type: string
            format: date
        - name: sort
          in: query
          description: Поле сортировки
          schema:
            type: string
            enum: [created_at, quantity, type]
        - $ref: '#/components/parameters/DirectionOptional'
      responses:
        '200':
          description: История складских операций
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/StockMovementDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /statistics/stock:
    get:
      tags: [Statistics]
      summary: Получить статистику по остаткам
      operationId: getStockStatistics
      responses:
        '200':
          description: Статистика по остаткам
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StockStatistics'
              example:
                success: true
                data:
                  products_total: 25
                  warehouses_total: 3
                  positions_with_stock: 14
                  total_quantity: 350
                  by_warehouse:
                    - warehouse_id: 1
                      warehouse_code: MAIN
                      warehouse_name: Main warehouse
                      positions: 8
                      quantity: 220
                  low_stock:
                    - product_id: 1
                      sku: CPU-001
                      name: Intel Core i5
                      total_quantity: 2
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API-ключ из переменной окружения `API_KEY`.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: ID ресурса
      schema:
        type: integer
        minimum: 1

    Page:
      name: page
      in: query
      description: Номер страницы
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPage:
      name: per_page
      in: query
      description: Количество элементов на странице
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15

    Direction:
      name: direction
      in: query
      description: Направление сортировки
      schema:
        type: string
        enum: [asc, desc]
        default: desc

    DirectionOptional:
      name: direction
      in: query
      description: Направление сортировки. Передается вместе с параметром `sort`.
      schema:
        type: string
        enum: [asc, desc]

  responses:
    Unauthorized:
      description: API-ключ отсутствует или неверный
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Invalid API key.
            meta:
              request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found.
            meta:
              request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Validation failed.
              fields:
                sku:
                  - The sku field is required.
            meta:
              request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: Internal server error.
            meta:
              request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    InsufficientStock:
      description: Недостаточно товара для операции
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: INSUFFICIENT_STOCK
              message: Not enough stock for this operation.
            meta:
              request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    InactiveResource:
      description: Товар или склад неактивен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            inactiveProduct:
              value:
                success: false
                error:
                  code: BAD_REQUEST
                  message: Product is inactive.
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5
            inactiveWarehouse:
              value:
                success: false
                error:
                  code: BAD_REQUEST
                  message: Warehouse is inactive.
                meta:
                  request_id: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

  schemas:
    Meta:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
          format: uuid
          example: 7c0ce1fe-6279-4a58-b424-60443f79bdd5

    PaginationMeta:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - type: object
          required: [page, per_page, total]
          properties:
            page:
              type: integer
              minimum: 1
              example: 1
            per_page:
              type: integer
              minimum: 1
              maximum: 100
              example: 15
            total:
              type: integer
              minimum: 0
              example: 1

    SuccessResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          nullable: true
        meta:
          $ref: '#/components/schemas/Meta'

    PaginatedSuccessResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items: {}
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    EmptySuccessResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              nullable: true
              example: null

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Bad request.

    ErrorResponse:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/Error'
        meta:
          $ref: '#/components/schemas/Meta'

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          required: [fields]
          properties:
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

    ValidationErrorResponse:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ValidationError'
        meta:
          $ref: '#/components/schemas/Meta'

    ProductWriteRequest:
      type: object
      required: [sku, name]
      properties:
        sku:
          type: string
          maxLength: 64
          example: CPU-001
        name:
          type: string
          maxLength: 255
          example: Intel Core i5
        description:
          type: string
          nullable: true
          maxLength: 2000
          example: Desktop processor
        is_active:
          type: boolean
          default: true
          example: true

    Product:
      type: object
      required: [id, sku, name, description, is_active, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        sku:
          type: string
          maxLength: 64
          example: CPU-001
        name:
          type: string
          maxLength: 255
          example: Intel Core i5
        description:
          type: string
          nullable: true
          maxLength: 2000
          example: Desktop processor
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    ProductDetails:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          required: [total_quantity, stock_balances]
          properties:
            total_quantity:
              type: integer
              minimum: 0
              example: 10
            stock_balances:
              type: array
              items:
                type: object
                required: [warehouse, quantity]
                properties:
                  warehouse:
                    $ref: '#/components/schemas/WarehouseSummary'
                  quantity:
                    type: integer
                    minimum: 0

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Product'

    WarehouseWriteRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          maxLength: 255
          example: Main warehouse
        code:
          type: string
          maxLength: 64
          example: MAIN
        is_active:
          type: boolean
          default: true
          example: true

    Warehouse:
      type: object
      required: [id, name, code, is_active, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        name:
          type: string
          maxLength: 255
          example: Main warehouse
        code:
          type: string
          maxLength: 64
          example: MAIN
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    WarehouseDetails:
      allOf:
        - $ref: '#/components/schemas/Warehouse'
        - type: object
          required: [total_quantity, positive_stock_count]
          properties:
            total_quantity:
              type: integer
              minimum: 0
              example: 220
            positive_stock_count:
              type: integer
              minimum: 0
              example: 8

    WarehouseResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Warehouse'

    ProductSummary:
      type: object
      required: [id, sku, name]
      properties:
        id:
          type: integer
          minimum: 1
        sku:
          type: string
        name:
          type: string

    WarehouseSummary:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: integer
          minimum: 1
        code:
          type: string
        name:
          type: string

    StockBalance:
      type: object
      required: [product, warehouse, quantity]
      properties:
        product:
          $ref: '#/components/schemas/ProductSummary'
        warehouse:
          $ref: '#/components/schemas/WarehouseSummary'
        quantity:
          type: integer
          minimum: 0

    StockOperationRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
        comment:
          type: string
          nullable: true
          maxLength: 2000

    IncomeRequest:
      allOf:
        - $ref: '#/components/schemas/StockOperationRequest'
        - type: object
          required: [warehouse_id]
          properties:
            warehouse_id:
              type: integer
              minimum: 1

    WriteOffRequest:
      allOf:
        - $ref: '#/components/schemas/StockOperationRequest'
        - type: object
          required: [warehouse_id]
          properties:
            warehouse_id:
              type: integer
              minimum: 1

    TransferRequest:
      allOf:
        - $ref: '#/components/schemas/StockOperationRequest'
        - type: object
          required: [source_warehouse_id, target_warehouse_id]
          properties:
            source_warehouse_id:
              type: integer
              minimum: 1
            target_warehouse_id:
              type: integer
              minimum: 1
              description: Должен отличаться от `source_warehouse_id`.

    StockMovement:
      type: object
      required:
        - id
        - product_id
        - source_warehouse_id
        - target_warehouse_id
        - quantity
        - type
        - comment
        - created_at
      properties:
        id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          minimum: 1
        source_warehouse_id:
          type: integer
          minimum: 1
          nullable: true
        target_warehouse_id:
          type: integer
          minimum: 1
          nullable: true
        quantity:
          type: integer
          minimum: 1
        type:
          type: string
          enum: [income, write_off, transfer]
        comment:
          type: string
          nullable: true
          maxLength: 2000
        created_at:
          type: string
          format: date-time
          nullable: true

    StockMovementDetails:
      allOf:
        - $ref: '#/components/schemas/StockMovement'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductSummary'
            source_warehouse:
              allOf:
                - $ref: '#/components/schemas/WarehouseSummary'
              nullable: true
            target_warehouse:
              allOf:
                - $ref: '#/components/schemas/WarehouseSummary'
              nullable: true

    StockMovementResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/StockMovement'

    WarehouseStatistics:
      type: object
      required:
        - warehouse_id
        - warehouse_code
        - warehouse_name
        - positions
        - quantity
      properties:
        warehouse_id:
          type: integer
          minimum: 1
        warehouse_code:
          type: string
        warehouse_name:
          type: string
        positions:
          type: integer
          minimum: 0
        quantity:
          type: integer
          minimum: 0

    LowStockProduct:
      type: object
      required: [product_id, sku, name, total_quantity]
      properties:
        product_id:
          type: integer
          minimum: 1
        sku:
          type: string
        name:
          type: string
        total_quantity:
          type: integer
          minimum: 1
          maximum: 4

    StockStatistics:
      type: object
      required:
        - products_total
        - warehouses_total
        - positions_with_stock
        - total_quantity
        - by_warehouse
        - low_stock
      properties:
        products_total:
          type: integer
          minimum: 0
        warehouses_total:
          type: integer
          minimum: 0
        positions_with_stock:
          type: integer
          minimum: 0
        total_quantity:
          type: integer
          minimum: 0
        by_warehouse:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseStatistics'
        low_stock:
          type: array
          items:
            $ref: '#/components/schemas/LowStockProduct'
